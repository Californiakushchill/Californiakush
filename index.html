<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>California Kush CBD</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --pink: #f27db0; --black: #000000; --white: #ffffff; }
    html, body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .banner {
      position: relative; width: 100%; height: 100vh; min-height: 500px;
      background: #111; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
    }
    .banner-placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: #333; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .banner-upload-hint {
      position: absolute; top: 20px; right: 20px;
      background: rgba(242,125,176,0.15); border: 1px solid var(--pink);
      color: var(--pink); font-size: 12px; padding: 8px 14px; border-radius: 4px;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
    }
    .banner-upload-hint:hover { background: rgba(242,125,176,0.3); }
    .banner img.hero-img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .banner::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 30%; background: linear-gradient(to top, #000 0%, transparent 100%); pointer-events: none;
    }
    .cta-wrapper {
      position: absolute; z-index: 10; top: 72%; left: 0; right: 0; transform: none; display: flex; justify-content: center;
      transform: translateX(-50%); animation: fadeUp 0.8s 0.2s both;
      white-space: nowrap;
    }
    .cta-btn {
      display: inline-block; padding: 18px 48px; background: var(--pink); color: var(--black);
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.12em;
      text-decoration: none; border-radius: 3px; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(242,125,176,0.4);
    }
    .cta-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 0 50px rgba(242,125,176,0.6); }
    .cta-btn:active { transform: translateY(0) scale(0.99); }

    .reassurance {
      display: flex; justify-content: center; align-items: stretch; background: var(--black);
    }
    .reass-item {
      flex: 1; max-width: 360px; display: flex; flex-direction: column;
      align-items: center; gap: 14px; padding: 44px 32px;
      border-top: 1px solid #1a1a1a; animation: fadeUp 0.7s both;
    }
    .reass-item:nth-child(1) { animation-delay: 0.1s; }
    .reass-item:nth-child(2) { animation-delay: 0.25s; border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; }
    .reass-item:nth-child(3) { animation-delay: 0.4s; }
    .reass-icon { width: 52px; height: 52px; color: var(--pink); flex-shrink: 0; }
    .reass-label { font-size: 14px; font-weight: 400; letter-spacing: 0.06em; text-align: center; color: rgba(255,255,255,0.85); text-transform: uppercase; line-height: 1.5; }
    .reass-label strong { display: block; font-size: 16px; font-weight: 500; color: var(--white); margin-bottom: 2px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      .reassurance { flex-direction: column; align-items: center; }
      .reass-item { width: 100%; max-width: 100%; border-left: none !important; border-right: none !important; padding: 32px 24px; }
      .cta-btn { font-size: 18px; padding: 16px 36px; }
    }
  </style>
</head>
